[workspace]
authors = ["zdh <goodalleveryday@gmail.com>"]
channels = ["conda-forge"]
name = "chewice_fork"
platforms = ["linux-64"]
version = "0.1.0"

[tasks]
fmt = { cmd = "cargo fmt --all -- --check", description = "Check Rust formatting" }
test = { cmd = "cargo test --workspace", description = "Run Rust workspace tests" }
mcp-smoke = { cmd = "cargo run -p wisp-mcp --example smoke", description = "Run bundled MCP client smoke test" }
ui-test = { cmd = 'LD_LIBRARY_PATH="${CONDA_PREFIX}/lib${LD_LIBRARY_PATH:+:$LD_LIBRARY_PATH}" npm ci && LD_LIBRARY_PATH="${CONDA_PREFIX}/lib${LD_LIBRARY_PATH:+:$LD_LIBRARY_PATH}" npx playwright test', cwd = "ui-tests", description = "Run Playwright UI tests" }

[dependencies]
rust = ">=1.97.0,<1.98"
nodejs = ">=26.5.0,<26.6"
python = ">=3.14.6,<3.15"
uv = ">=0.11.28,<0.12"
pkg-config = ">=0.29.2,<0.30"
dbus = ">=1.16.2,<2"
gtk3 = ">=3.24.52,<4"
"webkit2gtk4.1" = ">=2.48.5,<3"
zlib = ">=1.3.2,<2"
expat = ">=2.8.1,<3"
trunk = ">=0.21.14,<0.22"
rust-std-wasm32-unknown-unknown = ">=1.97.0,<2"
tauri = ">=2.11.4,<3"
alsa-lib = ">=1.2.16.1,<2"

[system-requirements]
libc = "2.35"
