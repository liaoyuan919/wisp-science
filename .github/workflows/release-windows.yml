name: Windows Release

on:
  push:
    tags: ["v*"]
  workflow_dispatch:
    inputs:
      tag:
        description: Tag to build and publish (e.g. v0.1.0)
        required: true
        default: v0.1.0

permissions:
  contents: write

jobs:
  release:
    runs-on: windows-latest
    env:
      RELEASE_TAG: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && format('refs/tags/{0}', inputs.tag) || github.ref }}

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - uses: swatinem/rust-cache@v2
        with:
          workspaces: |
            . -> target
            ui -> target
          cache-on-failure: true

      - name: Cache Trunk and Tauri CLI
        uses: actions/cache@v4
        with:
          path: ~/.cargo/bin
          key: tauri-tools-${{ runner.os }}-v1

      - name: Install Trunk and Tauri CLI
        shell: pwsh
        run: |
          if (-not (Get-Command trunk -ErrorAction SilentlyContinue)) {
            cargo install trunk --locked
          }
          if (-not (Get-Command cargo-tauri -ErrorAction SilentlyContinue)) {
            cargo install tauri-cli --version "^2" --locked
          }

      - name: Read release notes
        id: notes
        shell: pwsh
        run: |
          $tag = $env:RELEASE_TAG
          $path = ".github/release-notes/$tag.md"
          if (-not (Test-Path $path)) {
            Write-Host "No release notes at $path, falling back to v0.1.0.md"
            $path = ".github/release-notes/v0.1.0.md"
          }
          if (-not (Test-Path $path)) {
            Write-Error "Release notes not found for $tag"
          }
          $body = Get-Content $path -Raw
          "body<<EOF" >> $env:GITHUB_OUTPUT
          $body >> $env:GITHUB_OUTPUT
          "EOF" >> $env:GITHUB_OUTPUT

      - uses: tauri-apps/tauri-action@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          projectPath: src-tauri
          tauriScript: cargo tauri
          tagName: ${{ env.RELEASE_TAG }}
          releaseName: wisp-science ${{ env.RELEASE_TAG }}
          releaseBody: ${{ steps.notes.outputs.body }}
          releaseDraft: false
          prerelease: true
          uploadUpdaterJson: false
          uploadUpdaterSignatures: false
          args: --bundles msi,nsis
