name: "✨ 功能建议"
description: "提出新的功能、工作流或改进建议"
title: "[Feature]: "
body:
  - type: checkboxes
    attributes:
      label: 提交前检查
      options:
        - label: "我已搜索现有 Issue，确认没有相同或相近的建议。"
          required: true

  - type: textarea
    id: problem
    attributes:
      label: 要解决的问题
      description: "请描述具体使用场景、当前遇到的困难，以及这个问题对你造成的影响。"
    validations:
      required: true

  - type: textarea
    id: proposed-solution
    attributes:
      label: 期望的解决方案
      description: "请描述你希望 Wisp 如何工作。"
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: 考虑过的替代方案
      description: "你目前如何绕过这个问题？也可以补充参考产品或相关链接。"

  - type: input
    id: app-version
    attributes:
      label: Wisp 版本（如相关）
      description: "可在窗口标题栏或“设置”页面底部查看。"
      placeholder: "例如：0.20.0"

  - type: textarea
    id: additional-context
    attributes:
      label: 其他补充信息
      description: "可在此上传草图、截图或其他资料。"
