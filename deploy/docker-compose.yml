services:
  wisp-server:
    image: ${WISP_IMAGE}
    restart: unless-stopped
    env_file:
      - .env
    expose:
      - "8080"
    mem_limit: 768m
    cpus: 1.5
    pids_limit: 256
    security_opt:
      - no-new-privileges:true
    read_only: true
    tmpfs:
      - /tmp:size=128m,mode=1777
    healthcheck:
      test:
        - CMD
        - python3
        - -c
        - "import urllib.request; assert urllib.request.urlopen('http://127.0.0.1:8080/health', timeout=3).read() == b'ok'"
      interval: 30s
      timeout: 5s
      start_period: 30s
      retries: 3
    logging:
      driver: local
      options:
        max-size: 10m
        max-file: "3"

  caddy:
    image: caddy:2.10-alpine
    restart: unless-stopped
    environment:
      ACME_EMAIL: ${ACME_EMAIL}
    depends_on:
      wisp-server:
        condition: service_healthy
    ports:
      - "80:80"
      - "443:443"
      - "443:443/udp"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    security_opt:
      - no-new-privileges:true
    logging:
      driver: local
      options:
        max-size: 10m
        max-file: "3"

volumes:
  caddy_data:
  caddy_config:
